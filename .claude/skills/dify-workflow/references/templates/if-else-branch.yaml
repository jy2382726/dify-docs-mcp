app:
  name: "内容分类处理"
  description: "根据内容类型选择不同处理方式"
  icon: "🔀"
  icon_type: emoji
  icon_background: "#D1E9FF"
  mode: workflow
  use_icon_as_answer_icon: false
kind: app
version: "0.6.0"
dependencies: []
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      image:
        enabled: false
      enabled: false
    opening_statement: ""
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
  graph:
    edges:
    - data:
        isInIteration: false
        sourceType: start
        targetType: if-else
      id: 2000001-source-2000002-target
      source: "2000001"
      sourceHandle: source
      target: "2000002"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: llm
      id: 2000002-true-2000003-target
      source: "2000002"
      sourceHandle: "true"
      target: "2000003"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: llm
      id: 2000002-false-2000004-target
      source: "2000002"
      sourceHandle: "false"
      target: "2000004"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: llm
        targetType: variable-aggregator
      id: 2000003-source-2000005-target
      source: "2000003"
      sourceHandle: source
      target: "2000005"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: llm
        targetType: variable-aggregator
      id: 2000004-source-2000005-target
      source: "2000004"
      sourceHandle: source
      target: "2000005"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: variable-aggregator
        targetType: end
      id: 2000005-source-2000006-target
      source: "2000005"
      sourceHandle: source
      target: "2000006"
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        title: "开始"
        type: start
        variables:
          - label: "输入内容"
            variable: content
            type: paragraph
            required: true
            max_length: 10000
      height: 120
      id: "2000001"
      position: { x: 30, y: 300 }
      positionAbsolute: { x: 30, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "是否含代码"
        type: if-else
        cases:
          - case_id: "true"
            conditions:
              - comparison_operator: contains
                id: "cond-001"
                value: "```"
                varType: string
                variable_selector: ["2000001", content]
            id: "true"
            logical_operator: and
        conditions:
          - comparison_operator: contains
            id: "cond-001"
            value: "```"
            variable_selector: ["2000001", content]
        logical_operator: and
        desc: ""
      height: 126
      id: "2000002"
      position: { x: 334, y: 300 }
      positionAbsolute: { x: 334, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "代码分析"
        type: llm
        model:
          provider: deepseek
          name: deepseek-chat
          mode: chat
          completion_params:
            temperature: 0.3
        prompt_template:
          - id: "p1"
            role: user
            text: "分析以下代码：\n\n{{#2000001.content#}}"
        context:
          enabled: false
          variable_selector: []
        variables: []
        vision:
          enabled: false
        selected: false
      height: 98
      id: "2000003"
      position: { x: 638, y: 200 }
      positionAbsolute: { x: 638, y: 200 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "文本分析"
        type: llm
        model:
          provider: deepseek
          name: deepseek-chat
          mode: chat
          completion_params:
            temperature: 0.7
        prompt_template:
          - id: "p2"
            role: user
            text: "分析以下文本：\n\n{{#2000001.content#}}"
        context:
          enabled: false
          variable_selector: []
        variables: []
        vision:
          enabled: false
        selected: false
      height: 98
      id: "2000004"
      position: { x: 638, y: 400 }
      positionAbsolute: { x: 638, y: 400 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "汇总结果"
        type: variable-aggregator
        output_type: string
        variables:
          - ["2000003", text]
          - ["2000004", text]
        advanced_settings:
          group_enabled: false
      height: 80
      id: "2000005"
      position: { x: 942, y: 300 }
      positionAbsolute: { x: 942, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "结束"
        type: end
        outputs:
          - value_selector: ["2000005", output]
            variable: result
      height: 90
      id: "2000006"
      position: { x: 1246, y: 300 }
      positionAbsolute: { x: 1246, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport: { x: 50, y: 150, zoom: 0.7 }
