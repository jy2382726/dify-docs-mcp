app:
  name: "天气查询"
  description: "获取天气数据并格式化"
  icon: "🌤"
  icon_type: emoji
  icon_background: "#E4FBCC"
  mode: workflow
  use_icon_as_answer_icon: false
kind: app
version: "0.6.0"
dependencies: []
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      image:
        enabled: false
      enabled: false
    opening_statement: ""
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
  graph:
    edges:
    - data:
        isInIteration: false
        sourceType: start
        targetType: http-request
      id: 3000001-source-3000002-target
      source: "3000001"
      sourceHandle: source
      target: "3000002"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: http-request
        targetType: code
      id: 3000002-source-3000003-target
      source: "3000002"
      sourceHandle: source
      target: "3000003"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: code
        targetType: end
      id: 3000003-source-3000004-target
      source: "3000003"
      sourceHandle: source
      target: "3000004"
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        title: "开始"
        type: start
        variables:
          - label: "城市"
            variable: city
            type: text-input
            required: true
            max_length: 48
      height: 90
      id: "3000001"
      position: { x: 30, y: 300 }
      positionAbsolute: { x: 30, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "获取天气"
        type: http-request
        method: get
        url: "https://wttr.in/{{#3000001.city#}}?format=j1"
        headers: ""
        params: ""
        body:
          type: none
          data: []
        authorization:
          type: no-auth
          config: null
        timeout:
          max_connect_timeout: 10
          max_read_timeout: 30
          max_write_timeout: 30
        variables: []
      height: 110
      id: "3000002"
      position: { x: 334, y: 300 }
      positionAbsolute: { x: 334, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "格式化"
        type: code
        code_language: python3
        code: |
          def main(body: str) -> dict:
              import json
              data = json.loads(body)
              current = data.get("current_condition", [{}])[0]
              result = f"温度: {current.get('temp_C', 'N/A')}°C\n"
              result += f"湿度: {current.get('humidity', 'N/A')}%\n"
              result += f"风速: {current.get('windspeedKmph', 'N/A')} km/h"
              return {"output": result}
        variables:
          - value_selector: ["3000002", body]
            variable: body
        outputs:
          output:
            type: string
            children: null
        desc: ""
      height: 54
      id: "3000003"
      position: { x: 638, y: 300 }
      positionAbsolute: { x: 638, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "结束"
        type: end
        outputs:
          - value_selector: ["3000003", output]
            variable: weather
      height: 90
      id: "3000004"
      position: { x: 942, y: 300 }
      positionAbsolute: { x: 942, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport: { x: 50, y: 200, zoom: 0.8 }
