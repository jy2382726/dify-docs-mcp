app:
  name: "批量摘要"
  description: "对输入列表中的每项内容生成摘要"
  icon: "🔁"
  icon_type: emoji
  icon_background: "#E4FBCC"
  mode: workflow
  use_icon_as_answer_icon: false
kind: app
version: 0.6.0
dependencies: []
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions: []
      allowed_file_types: []
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: code
      id: start_1-source-parse_1-target
      source: start_1
      sourceHandle: source
      target: parse_1
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: iteration
      id: parse_1-source-iteration_1-target
      source: parse_1
      sourceHandle: source
      target: iteration_1
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: iteration
        targetType: end
      id: iteration_1-source-end_1-target
      source: iteration_1
      sourceHandle: source
      target: end_1
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: true
        isInLoop: false
        iteration_id: iteration_1
        sourceType: iteration-start
        targetType: llm
      id: iteration_start_1-source-iter_llm_1-target
      source: iteration_start_1
      sourceHandle: source
      target: iter_llm_1
      targetHandle: target
      type: custom
      zIndex: 1002
    nodes:
    - data:
        desc: ''
        selected: false
        title: Start
        type: start
        variables:
        - label: Text Items
          max_length: 50000
          required: true
          type: paragraph
          variable: text_items
      height: 108
      id: start_1
      position:
        x: 30
        y: 300
      positionAbsolute:
        x: 30
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(text_items: str) -> dict:\n    items = json.loads(text_items)\n\
          \    if not isinstance(items, list):\n        items = [items]\n    return\
          \ {\"items\": items}\n"
        code_language: python3
        desc: Parse the input JSON string into a list
        outputs:
          items:
            children:
              type: string
            type: array
        selected: false
        title: Parse List
        type: code
        variables:
        - value_selector:
          - start_1
          - text_items
          variable: text_items
      height: 79
      id: parse_1
      position:
        x: 334
        y: 300
      positionAbsolute:
        x: 334
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        desc: ''
        error_handle_mode: remove-abnormally
        height: 292
        is_parallel: false
        iterator_selector:
        - parse_1
        - items
        output_selector:
        - iter_llm_1
        - text
        output_type: array[string]
        parallel_nums: 10
        selected: false
        startNodeType: llm
        start_node_id: iteration_start_1
        title: Iterate and Summarize
        type: iteration
        width: 500
      height: 292
      id: iteration_1
      position:
        x: 638
        y: 300
      positionAbsolute:
        x: 638
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 500
    - data:
        desc: ''
        isInIteration: true
        selected: false
        title: ''
        type: iteration-start
      draggable: false
      height: 48
      id: iteration_start_1
      parentId: iteration_1
      position:
        x: 24
        y: 68
      positionAbsolute:
        x: 662
        y: 368
      selectable: false
      sourcePosition: right
      targetPosition: left
      type: custom-iteration-start
      width: 44
      zIndex: 1002
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        isInIteration: true
        isIterationStart: true
        iteration_id: iteration_1
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: qwen-max
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: iter-sys-001
          role: system
          text: You are a concise summarizer. Output a one-sentence summary.
        - id: iter-user-001
          role: user
          text: "Summarize the following:\n\n{{#iteration_1.item#}}"
        selected: false
        title: Summarize Item
        type: llm
        variables: []
        vision:
          enabled: false
      extent: parent
      height: 98
      id: iter_llm_1
      parentId: iteration_1
      position:
        x: 117
        y: 85
      positionAbsolute:
        x: 755
        y: 385
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
      zIndex: 1001
    - data:
        desc: ''
        outputs:
        - value_selector:
          - iteration_1
          - output
          variable: summaries
        selected: false
        title: End
        type: end
      height: 114
      id: end_1
      position:
        x: 942
        y: 550
      positionAbsolute:
        x: 942
        y: 550
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    viewport:
      x: 50
      y: 200
      zoom: 0.7
