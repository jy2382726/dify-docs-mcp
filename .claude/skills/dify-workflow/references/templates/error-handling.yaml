app:
  name: "API Error Handler"
  description: "Call an external API with error handling and fallback"
  icon: "🛡️"
  icon_type: emoji
  icon_background: "#FFEAD5"
  mode: workflow
  use_icon_as_answer_icon: false
kind: app
version: "0.6.0"
dependencies: []
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      image:
        enabled: false
      enabled: false
    opening_statement: ""
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
  graph:
    edges:
    - data:
        isInIteration: false
        sourceType: start
        targetType: http-request
      id: start_1-source-http_1-target
      source: "start_1"
      sourceHandle: source
      target: "http_1"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: http-request
        targetType: if-else
      id: http_1-source-check_1-target
      source: "http_1"
      sourceHandle: source
      target: "check_1"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: llm
      id: check_1-true-llm_success_1-target
      source: "check_1"
      sourceHandle: "true"
      target: "llm_success_1"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: if-else
        targetType: code
      id: check_1-false-code_error_1-target
      source: "check_1"
      sourceHandle: "false"
      target: "code_error_1"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: llm
        targetType: end
      id: llm_success_1-source-end_1-target
      source: "llm_success_1"
      sourceHandle: source
      target: "end_1"
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        sourceType: code
        targetType: end
      id: code_error_1-source-end_1-target
      source: "code_error_1"
      sourceHandle: source
      target: "end_1"
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        title: "Start"
        type: start
        variables:
          - label: "User Query"
            variable: query
            type: paragraph
            required: true
            max_length: 5000
      height: 120
      id: "start_1"
      position: { x: 30, y: 300 }
      positionAbsolute: { x: 30, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "Call External API"
        type: http-request
        method: get
        url: "https://api.example.com/data?q={{#start_1.query#}}"
        headers: ""
        params: ""
        body:
          type: none
          data: []
        authorization:
          type: no-auth
          config: null
        timeout:
          max_connect_timeout: 10
          max_read_timeout: 30
          max_write_timeout: 30
        retry_config:
          retry_enabled: false
        variables: []
        selected: false
      height: 110
      id: "http_1"
      position: { x: 334, y: 300 }
      positionAbsolute: { x: 334, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "Check Status Code"
        type: if-else
        cases:
          - case_id: "true"
            conditions:
              - comparison_operator: "="
                id: "cond-status-001"
                value: "200"
                varType: number
                variable_selector: ["http_1", status_code]
            id: "true"
            logical_operator: and
        conditions:
          - comparison_operator: "="
            id: "cond-status-001"
            value: "200"
            varType: number
            variable_selector: ["http_1", status_code]
        logical_operator: and
        desc: "Check if API returned HTTP 200"
        selected: false
      height: 126
      id: "check_1"
      position: { x: 638, y: 300 }
      positionAbsolute: { x: 638, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "Process Success"
        type: llm
        model:
          provider: langgenius/tongyi/tongyi
          name: qwen-max
          mode: chat
          completion_params:
            temperature: 0.3
        prompt_template:
          - id: "success-sys-001"
            role: system
            text: "You are a helpful assistant. Summarize the API response."
          - id: "success-user-001"
            role: user
            text: "API response for query '{{#start_1.query#}}':\n\n{{#http_1.body#}}"
        context:
          enabled: false
          variable_selector: []
        variables: []
        vision:
          enabled: false
        selected: false
      height: 98
      id: "llm_success_1"
      position: { x: 942, y: 200 }
      positionAbsolute: { x: 942, y: 200 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "Format Error"
        type: code
        code_language: python3
        code: |
          def main(status_code: int, body: str, query: str) -> dict:
              error_msg = (
                  f"API request failed.\n"
                  f"Status: {status_code}\n"
                  f"Query: {query}\n"
                  f"Response: {body[:500]}"
              )
              return {"error": error_msg}
        variables:
          - value_selector: ["http_1", status_code]
            variable: status_code
          - value_selector: ["http_1", body]
            variable: body
          - value_selector: ["start_1", query]
            variable: query
        outputs:
          error:
            type: string
            children: null
        desc: "Format a human-readable error message"
        selected: false
      height: 98
      id: "code_error_1"
      position: { x: 942, y: 400 }
      positionAbsolute: { x: 942, y: 400 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        title: "End"
        type: end
        outputs:
          - variable: result
            value_selector: ["llm_success_1", text]
          - variable: error
            value_selector: ["code_error_1", error]
      height: 90
      id: "end_1"
      position: { x: 1246, y: 300 }
      positionAbsolute: { x: 1246, y: 300 }
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport: { x: 50, y: 200, zoom: 0.7 }
